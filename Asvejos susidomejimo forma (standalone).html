  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c67127e5-bfb2-4b97-a486-751b0ae15047\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"bf2dad2c-c4af-4b6a-a5ad-620e4b1f1403\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"b4c9cbef-8931-4dd9-8dcb-42a7ee2a068c\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"0193da53-39f9-41f1-b5d7-d1868c34aaa5\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7f8100c2-fd4a-42cc-8d1d-515bafa77ab4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c67127e5-bfb2-4b97-a486-751b0ae15047\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --cream:#F4EEE2; --paper:#FBF7EF; --forest:#2E3B2C; --forest-2:#43543A;\n    --moss:#6E7A53; --gold:#A9863F; --gold-soft:#C8A864; --terra:#B0744A;\n    --ink:#2A2620; --ink-soft:#5C564C; --line:#E0D6C4;\n  }\n  *{ box-sizing:border-box; margin:0; padding:0; }\n  body{ font-family:\"Mulish\",sans-serif; color:var(--ink); background:var(--forest);\n    -webkit-font-smoothing:antialiased; min-height:100vh; display:grid; place-items:center; padding:34px 20px; }\n\n  .card{ width:100%; max-width:1000px; background:var(--paper); border-radius:16px; overflow:hidden;\n    box-shadow:0 30px 80px rgba(0,0,0,.4); display:grid; grid-template-columns:0.92fr 1.08fr; min-height:660px; }\n\n  /* left visual */\n  .visual{ position:relative; color:#fff; display:flex; flex-direction:column; justify-content:space-between; padding:44px 40px; }\n  .visual img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center 44%; z-index:0; }\n  .visual::after{ content:\"\"; position:absolute; inset:0; z-index:1;\n    background:linear-gradient(180deg, rgba(20,26,16,.72) 0%, rgba(20,26,16,.30) 38%, rgba(14,19,10,.82) 100%); }\n  .visual > *{ position:relative; z-index:2; }\n  .visual .wm{ font-size:12px; font-weight:800; letter-spacing:.28em; text-transform:uppercase; }\n  .visual .wm span{ color:var(--gold-soft); }\n  .visual .lead h2{ font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:40px; line-height:1.05; }\n  .visual .lead p{ margin-top:14px; font-size:14.5px; color:rgba(255,255,255,.86); max-width:34ch; line-height:1.5; }\n  .visual .feats{ display:flex; flex-direction:column; gap:10px; margin-top:22px; }\n  .visual .feats div{ display:flex; gap:10px; font-size:13.5px; font-weight:600; align-items:center; }\n  .visual .feats .d{ width:6px; height:6px; border-radius:50%; background:var(--gold-soft); flex:0 0 auto; }\n\n  /* right form */\n  .form{ padding:44px 46px 40px; display:flex; flex-direction:column; }\n  .kicker{ font-size:11px; font-weight:800; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); }\n  .form h1{ font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:34px; color:var(--forest); line-height:1.08; margin:9px 0 6px; }\n  .form .intro{ font-size:14px; color:var(--ink-soft); margin-bottom:22px; }\n\n  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:15px 16px; }\n  .field{ display:flex; flex-direction:column; gap:6px; }\n  .field.full{ grid-column:1 / -1; }\n  label{ font-size:12px; font-weight:800; letter-spacing:.04em; color:var(--forest); text-transform:uppercase; }\n  label .req{ color:var(--terra); }\n  input, select, textarea{ font-family:\"Mulish\",sans-serif; font-size:14.5px; color:var(--ink);\n    border:1.5px solid var(--line); background:#fff; border-radius:8px; padding:11px 13px; width:100%; transition:border-color .15s, box-shadow .15s; }\n  input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--moss); box-shadow:0 0 0 3px rgba(110,122,83,.16); }\n  textarea{ resize:vertical; min-height:74px; }\n\n  .chips{ display:flex; flex-wrap:wrap; gap:8px; }\n  .chip{ position:relative; }\n  .chip input{ position:absolute; opacity:0; pointer-events:none; }\n  .chip span{ display:block; padding:9px 16px; border:1.5px solid var(--line); border-radius:100px; font-size:13.5px; font-weight:700; color:var(--ink-soft); cursor:pointer; transition:all .15s; user-select:none; }\n  .chip input:checked + span{ background:var(--forest); border-color:var(--forest); color:#fff; }\n\n  .submit{ margin-top:8px; border:none; cursor:pointer; background:var(--gold); color:#23200f;\n    font-family:\"Mulish\",sans-serif; font-size:15.5px; font-weight:800; letter-spacing:.01em;\n    padding:15px 24px; border-radius:100px; transition:background .15s; }\n  .submit:hover{ background:var(--gold-soft); }\n  .formfoot{ font-size:12px; color:var(--ink-soft); margin-top:14px; text-align:center; }\n  .formfoot a{ color:var(--terra); font-weight:700; text-decoration:none; }\n\n  /* success */\n  .success{ display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; flex:1; padding:30px 10px; }\n  .success.show{ display:flex; }\n  .form.sent .formgrid, .form.sent .kicker, .form.sent h1, .form.sent .intro{ display:none; }\n  .success .mark{ width:70px; height:70px; border-radius:50%; background:var(--moss); display:grid; place-items:center; margin-bottom:20px; }\n  .success .mark svg{ width:34px; height:34px; }\n  .success h3{ font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:32px; color:var(--forest); }\n  .success p{ font-size:14.5px; color:var(--ink-soft); margin-top:10px; max-width:38ch; line-height:1.5; }\n  .success .again{ margin-top:22px; background:transparent; border:1.5px solid var(--line); color:var(--forest); font-weight:700; font-size:13.5px; padding:11px 22px; border-radius:100px; cursor:pointer; }\n\n  @media (max-width:820px){\n    .card{ grid-template-columns:1fr; }\n    .visual{ min-height:240px; }\n    .grid{ grid-template-columns:1fr; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"card\">\n    <aside class=\"visual\">\n      <img src=\"2cd8e8fe-f582-48aa-ad63-c3f44e27ecaf\" alt=\"Vestuvių vakarienė girioje\">\n      <div class=\"wm\">ASVEJOS <span>POILSIAVIETĖ<\u002Fspan><\u002Fdiv>\n      <div>\n        <div class=\"lead\">\n          <h2>Jūsų šventė<br>prasideda čia<\u002Fh2>\n          <p>Palikite kontaktus ir trumpą žinutę — susisieksiu su laisvomis datomis ir kainomis.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"feats\">\n          <div><span class=\"d\"><\u002Fspan>2 ha privati giria su lauko scena<\u002Fdiv>\n          <div><span class=\"d\"><\u002Fspan>Nakvynė vietoje · pirtis · sava virtuvė<\u002Fdiv>\n          <div><span class=\"d\"><\u002Fspan>Vestuvėms, įmonių ir privačioms šventėms<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <section class=\"form\" id=\"form\">\n      <div class=\"kicker\">Susidomėjimo forma<\u002Fdiv>\n      <h1>Pasiteiraukite dėl datos<\u002Fh1>\n      <p class=\"intro\">Užpildykite — atsakysiu per 1–2 dienas. Laukai su <span style=\"color:var(--terra)\">*<\u002Fspan> privalomi.<\u002Fp>\n\n      <form class=\"formgrid\" id=\"interestForm\" onsubmit=\"return submitForm(event)\">\n        <div class=\"grid\">\n          <div class=\"field\">\n            <label>Vardas <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <input type=\"text\" name=\"vardas\" required=\"\" placeholder=\"Jūsų vardas\">\n          <\u002Fdiv>\n          <div class=\"field\">\n            <label>Telefonas arba el. paštas <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <input type=\"text\" name=\"kontaktas\" required=\"\" placeholder=\"+370 … arba el. paštas\">\n          <\u002Fdiv>\n          <div class=\"field\">\n            <label>Pageidaujama data<\u002Flabel>\n            <input type=\"text\" name=\"data\" placeholder=\"Pvz. 2026 m. liepa\">\n          <\u002Fdiv>\n          <div class=\"field\">\n            <label>Svečių skaičius<\u002Flabel>\n            <input type=\"text\" name=\"sveciai\" placeholder=\"Pvz. 60–80\">\n          <\u002Fdiv>\n          <div class=\"field full\">\n            <label>Renginio tipas<\u002Flabel>\n            <div class=\"chips\">\n              <label class=\"chip\"><input type=\"radio\" name=\"tipas\" value=\"Vestuvės\" checked=\"\"><span>Vestuvės<\u002Fspan><\u002Flabel>\n              <label class=\"chip\"><input type=\"radio\" name=\"tipas\" value=\"Įmonės šventė\"><span>Įmonės šventė<\u002Fspan><\u002Flabel>\n              <label class=\"chip\"><input type=\"radio\" name=\"tipas\" value=\"Privati šventė\"><span>Privati šventė<\u002Fspan><\u002Flabel>\n              <label class=\"chip\"><input type=\"radio\" name=\"tipas\" value=\"Bendradarbiavimas\"><span>Bendradarbiavimas<\u002Fspan><\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"field full\">\n            <label>Žinutė<\u002Flabel>\n            <textarea name=\"zinute\" placeholder=\"Papasakokite trumpai apie savo šventę…\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"submit\" class=\"submit\">Siųsti užklausą →<\u002Fbutton>\n        <div class=\"formfoot\">Arba susisiekite tiesiai: <a href=\"tel:+37062183336\">+370 621 83336<\u002Fa> · <a href=\"mailto:asvejospoilsiaviete@gmail.com\">asvejospoilsiaviete@gmail.com<\u002Fa><\u002Fdiv>\n      <\u002Fform>\n\n      <div class=\"success\" id=\"success\">\n        <div class=\"mark\"><svg viewBox=\"0 0 34 34\" fill=\"none\"><path d=\"M8 18l6 6 12-14\" stroke=\"#fff\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Ačiū! Užklausa paruošta<\u002Fh3>\n        <p id=\"successMsg\">Atsidarys Jūsų el. pašto langas su paruošta žinute — tereikia paspausti „Siųsti\". Susisieksiu artimiausiu metu. 🌲<\u002Fp>\n        <button class=\"again\" onclick=\"resetForm()\">Pildyti iš naujo<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n<script>\n  // Keep this address in sync with your real inbox.\n  const VENUE_EMAIL = 'asvejospoilsiaviete@gmail.com';\n\n  function submitForm(e){\n    e.preventDefault();\n    const f = e.target;\n    const d = Object.fromEntries(new FormData(f).entries());\n    const subject = `Užklausa dėl ${d.tipas || 'šventės'} — ${d.vardas || ''}`.trim();\n    const body =\n`Vardas: ${d.vardas || '-'}\nKontaktas: ${d.kontaktas || '-'}\nPageidaujama data: ${d.data || '-'}\nSvečių skaičius: ${d.sveciai || '-'}\nRenginio tipas: ${d.tipas || '-'}\n\nŽinutė:\n${d.zinute || '-'}`;\n    const mailto = `mailto:${VENUE_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;\n    window.location.href = mailto;\n\n    document.getElementById('form').classList.add('sent');\n    document.getElementById('success').classList.add('show');\n    return false;\n  }\n  function resetForm(){\n    document.getElementById('interestForm').reset();\n    document.getElementById('form').classList.remove('sent');\n    document.getElementById('success').classList.remove('show');\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
